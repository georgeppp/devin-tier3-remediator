services:
  webhook:
    build: .
    command: uvicorn src.webhook:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    env_file: .env
    volumes: [".:/app"]
    restart: unless-stopped

  poller:
    build: .
    command: python -m src.poller
    env_file: .env
    volumes: [".:/app"]
    restart: unless-stopped
    depends_on: [webhook]

  dashboard:
    build: .
    command: streamlit run src/dashboard.py --server.address 0.0.0.0 --server.headless true
    ports: ["8501:8501"]
    env_file: .env
    volumes: [".:/app"]
    restart: unless-stopped
